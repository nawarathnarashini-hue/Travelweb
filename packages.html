<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Packages - GlobeTrek Adventures</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <div class="loader" id="loader"><div class="loader-spinner"></div></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="home.html" class="logo"><i class="fas fa-globe-americas"></i> GlobeTrek Adventures</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="packages.html" class="active">Packages</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-auth" id="navAuth">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="registration.html" class="btn btn-primary">Register</a>
            </div>
            <div class="nav-auth" id="navUser" style="display:none">
                <span id="userName" style="margin-right:10px; font-weight:600;"></span>
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>
            <div class="mobile-toggle" onclick="toggleMobile()"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="about-hero" style="height: 40vh; min-height: 300px;">
        <h1>Tour Packages</h1>
        <p>Find your perfect getaway from our curated collection</p>
    </div>

    <div class="section">
        <div class="filters-bar">
            <div class="filter-group">
                <label>Destination</label>
                <input type="text" class="form-control" id="filterDest" placeholder="Search destination..." onkeyup="filterPackages()">
            </div>
            <div class="filter-group">
                <label>Duration</label>
                <select class="form-control" id="filterDuration" onchange="filterPackages()">
                    <option value="">All Durations</option>
                    <option value="5">5 Days</option>
                    <option value="7">7 Days</option>
                    <option value="10">10 Days</option>
                    <option value="14">14 Days</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Max Price ($)</label>
                <input type="number" class="form-control" id="filterPrice" placeholder="Enter max price" onkeyup="filterPackages()">
            </div>
            <button class="btn btn-outline" onclick="resetFilters()">Reset</button>
        </div>
        <div class="packages-grid" id="allPackages"></div>
    </div>

    <footer class="footer">
        <div class="footer-bottom" style="border-top:1px solid rgba(255,255,255,0.1); padding-top:30px; text-align:center; opacity:0.7;">
            <p>GlobeTrek Adventures. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="packageModal" style="display:none; max-width:1000px;">
            <div class="modal-header">
                <h3>Package Details</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding:0; max-height:80vh; overflow-y:auto;">
                <div id="pkgModalHero" style="height:30vh; min-height:200px; background-size:cover; background-position:center; position:relative;">
                    <div style="position:absolute; bottom:0; left:0; right:0; height:50%; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);"></div>
                    <div class="package-details-content" id="pkgModalHeader" style="position:relative; z-index:1; padding:40px 20px; color:#fff; width:100%; max-width:1200px; margin:0 auto;"></div>
                </div>
                <div style="display:grid; grid-template-columns:2fr 1fr; gap:30px; padding:30px; max-width:1200px; margin:0 auto;">
                    <div id="pkgModalMain"></div>
                    <div style="position:sticky; top:20px; height:fit-content;">
                        <div class="booking-card" id="pkgModalBooking"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal" id="bookingModal" style="display:none; max-width:600px;">
            <div class="modal-header">
                <h3>Book Your Trip</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-success" id="bookingSuccess" style="display:none;">
                    Booking submitted successfully! Reference: <strong id="bookingRef"></strong>
                </div>
                <form onsubmit="handleBooking(event)">
                    <div class="form-row">
                        <label>Package</label>
                        <input type="text" class="form-control" id="bookPackage" readonly>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="form-row">
                            <label>Full Name *</label>
                            <input type="text" class="form-control" id="bookName" required>
                        </div>
                        <div class="form-row">
                            <label>Email *</label>
                            <input type="email" class="form-control" id="bookEmail" required>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="form-row">
                            <label>Travelers *</label>
                            <input type="number" class="form-control" id="bookTravelers" min="1" value="1" required onchange="calcTotal()">
                        </div>
                        <div class="form-row">
                            <label>Travel Date *</label>
                            <input type="date" class="form-control" id="bookDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>Special Requests</label>
                        <textarea class="form-control" id="bookRequests" rows="3"></textarea>
                    </div>
                    <div class="price-row" style="border-top:2px solid #eee; padding-top:15px; margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                        <span>Total Cost:</span>
                        <span class="price-total" id="bookTotal">$0</span>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:15px;">Confirm Booking</button>
                </form>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></button>
    <script src="main.js"></script>
</body>
</html>
